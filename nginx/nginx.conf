events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream Next.js app
    upstream nextjs_upstream {
        server web:3000;
    }

    # ─── HTTP Server ──────────────────────────────────────────────────────────
    # Serves on port 80.
    # ⚠️ TODO (after SSL): Replace this block with a redirect-only block:
    #   return 301 https://$host$request_uri;
    server {
        listen 80;
        server_name khabar24times.in www.khabar24times.in;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Static assets — long cache
        location /_next/static/ {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Public static files
        location /static/ {
            proxy_pass http://nextjs_upstream;
            add_header Cache-Control "public, max-age=86400";
        }

        # All other requests → Next.js
        location / {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # Forward real client IPs (bug fix: was $proxy_addrs)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── HTTPS Server (uncomment after SSL certificate is installed) ──────────
    # Run: certbot --nginx -d khabar24times.in -d www.khabar24times.in
    # Then uncomment the block below and reload nginx.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name khabar24times.in www.khabar24times.in;
    #
    #     ssl_certificate     /etc/letsencrypt/live/khabar24times.in/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/khabar24times.in/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     add_header X-Frame-Options "DENY" always;
    #     add_header X-XSS-Protection "1; mode=block" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    #
    #     location /_next/static/ {
